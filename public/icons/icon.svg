<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d946ef;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#grad)"/>
  <g transform="translate(256,256)">
    <!-- 中心圆环 -->
    <circle cx="0" cy="0" r="120" fill="none" stroke="white" stroke-width="20"/>
    <!-- 八个方向的点代表八大模块 -->
    <circle cx="0" cy="-150" r="25" fill="white"/>
    <circle cx="106" cy="-106" r="25" fill="white"/>
    <circle cx="150" cy="0" r="25" fill="white"/>
    <circle cx="106" cy="106" r="25" fill="white"/>
    <circle cx="0" cy="150" r="25" fill="white"/>
    <circle cx="-106" cy="106" r="25" fill="white"/>
    <circle cx="-150" cy="0" r="25" fill="white"/>
    <circle cx="-106" cy="-106" r="25" fill="white"/>
    <!-- 中心闪电代表AI -->
    <path d="M-20,-60 L20,-60 L10,0 L40,0 L-10,80 L10,20 L-20,20 Z" fill="white"/>
  </g>
</svg>
